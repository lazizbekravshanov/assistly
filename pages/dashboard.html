<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Dashboard — derot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/pages.css">
</head>
<body>
  <div class="page-container">
    <!-- Header -->
    <header class="page-header">
      <div class="page-header-left">
        <div class="page-logo">d</div>
        <h1 class="page-title">Focus Dashboard</h1>
        <span class="page-subtitle">This Week</span>
      </div>
      <button id="themeToggle" class="theme-btn">🌙</button>
    </header>

    <!-- Stats Row -->
    <div class="stats-row" id="statsRow">
      <div class="stat-box">
        <div class="stat-icon accent">⏱</div>
        <span class="stat-value" id="totalFocus">0h</span>
        <span class="stat-label">Total Focus</span>
      </div>
      <div class="stat-box">
        <div class="stat-icon danger">🚫</div>
        <span class="stat-value" id="totalBlocked">0</span>
        <span class="stat-label">Blocked</span>
      </div>
      <div class="stat-box">
        <div class="stat-icon success">🔥</div>
        <span class="stat-value" id="streak">0</span>
        <span class="stat-label">Streak</span>
      </div>
      <div class="stat-box">
        <div class="stat-icon purple">📊</div>
        <span class="stat-value" id="avgSession">0m</span>
        <span class="stat-label">Avg Session</span>
      </div>
    </div>

    <!-- Weekly Chart -->
    <div class="section chart-section">
      <h2 class="section-title">Weekly Overview</h2>
      <div class="chart" id="chart"></div>
    </div>

    <!-- Most Blocked -->
    <div class="section blocked-section">
      <h2 class="section-title">Most Blocked Sites</h2>
      <div id="blockedList"></div>
    </div>

    <!-- Milestones -->
    <div class="section milestones-section" id="milestonesSection" style="animation: fadeUp 0.3s ease 0.28s both;">
      <h2 class="section-title">Milestones</h2>
      <div class="milestone-badges" id="milestoneBadges"></div>
    </div>

    <!-- Goal Completion Rate -->
    <div class="section goal-section" id="goalSection" style="animation: fadeUp 0.3s ease 0.30s both;">
      <h2 class="section-title">Daily Goal Completion</h2>
      <div class="goal-rate-row">
        <span class="goal-rate-value" id="goalRate">0%</span>
        <span class="goal-rate-label">of days this week</span>
      </div>
    </div>

    <!-- Weekly Challenges -->
    <div class="section challenges-section" id="challengesSection" style="animation: fadeUp 0.3s ease 0.32s both;">
      <h2 class="section-title">Weekly Challenges</h2>
      <div id="challengeCards"></div>
      <div class="xp-rank-row">
        <div class="xp-bar-wrap">
          <div class="xp-bar" id="xpBar" style="width: 0%"></div>
        </div>
        <span class="xp-label" id="xpLabel">0 XP</span>
        <span class="rank-display" id="rankDisplay">Apprentice</span>
      </div>
    </div>

    <!-- Streak Calendar -->
    <div class="section calendar-section">
      <h2 class="section-title" id="calendarTitle">March 2026</h2>
      <div class="calendar-grid" id="calendar"></div>
    </div>

    <p class="page-footer">Stay focused. The results compound over time.</p>
  </div>

  <script src="../scripts/dashboard.js"></script>
</body>
</html>
